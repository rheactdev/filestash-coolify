# documentation: https://www.filestash.app/docs/
# slogan: A modern web client for your storage.
# tags: storage, s3, ftp, webdav, filestash
# logo: svgs/filestash.svg
# port: 8334

services:
  app:
    image: machines/filestash:latest
    # Removed container_name to let Coolify manage instances properly
    environment:
      # :? forces Coolify to mark this as required in the UI
      - APPLICATION_URL=${SERVICE_FQDN_APP:?}
      - CANARY=true
      - OFFICE_URL=http://wopi_server:9980
      - OFFICE_FILESTASH_URL=http://app:8334
      - OFFICE_REWRITE_URL=http://127.0.0.1:9980
    volumes:
      - filestash-data:/app/data/state/
    # No ports mapped here! The '# port: 8334' metadata at the top handles it.

  wopi_server:
    image: collabora/code:24.04.10.2.1
    environment:
      - "extra_params=--o:ssl.enable=false"
      - aliasgroup1="https://.*:443"
    command:
      - /bin/bash
      - -c
      - |
           curl -o /usr/share/coolwsd/browser/dist/branding-desktop.css https://gist.githubusercontent.com/mickael-kerjean/bc1f57cd312cf04731d30185cc4e7ba2/raw/d706dcdf23c21441e5af289d871b33defc2770ea/destop.css
           /bin/su -s /bin/bash -c '/start-collabora-online.sh' cool
    user: root

volumes:
  filestash-data:
